# Tmux configuration

# ─────────────────────────────────────────────────────────────────────────────
# Prefix key
# ─────────────────────────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─────────────────────────────────────────────────────────────────────────────
# General settings
# ─────────────────────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g mouse on                      # Enable mouse support
set -g history-limit 50000           # Scrollback buffer
set -g base-index 1                  # Start window numbering at 1
setw -g pane-base-index 1            # Start pane numbering at 1
set -g renumber-windows on           # Renumber windows when one is closed
set -g set-titles on                 # Set terminal title
set -s escape-time 0                 # No delay for escape key
set -g focus-events on               # Pass focus events to apps (for autoread)

# ─────────────────────────────────────────────────────────────────────────────
# Status bar (catppuccin)
# ─────────────────────────────────────────────────────────────────────────────

set -g status-position top
set -g status-interval 60            # Update every 60 seconds

# Catppuccin config (must be set BEFORE loading the plugin)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"

# Load catppuccin plugin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status line layout (must be set AFTER loading the plugin)
set -g status-left-length 40
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# ─────────────────────────────────────────────────────────────────────────────
# Keybindings
# ─────────────────────────────────────────────────────────────────────────────

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick popup terminal
bind C-k display-popup -E -w 80% -h 75% -d "#{pane_current_path}"

# Sessionizer (create/switch to a project session)
bind f display-popup -E -w 50% -h 50% "~/.config/tmux/sessionizer"

# Pane push/pull between windows
bind > command-prompt -p "push pane to window:" "join-pane -t '%%'"
bind < command-prompt -p "pull pane from (window.pane):" "join-pane -s '%%'"

# Window switching
bind C-a last-window                         # Toggle last window with C-a C-a
bind -n C-S-Left previous-window             # Previous window (no prefix)
bind -n C-S-Right next-window                # Next window (no prefix)
